name: Continuous Deployment

on:
  workflow_call:
  workflow_dispatch:

jobs:
  terraform-deploy:
    name: Terraform Apply (AWS Deploy)
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Terraform
        run: |
          curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o tf.zip
          unzip tf.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Verify AWS credentials
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS credentials are not configured in GitHub Secrets. Skipping Terraform deployment."
            exit 0
          fi
          echo "AWS credentials detected. Proceeding with deployment."

      - name: Terraform Init
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          cd iac
          terraform init -input=false -backend-config=../backend.hcl

      - name: Terraform Plan
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          cd iac
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          cd iac
          terraform apply -auto-approve -input=false tfplan
