apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-config
  namespace: default
data:
  FLASK_ENV: "production"
  PORT: "5000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopmart-observability
  namespace: default
  labels:
    app: shopmart-observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopmart-observability
  template:
    metadata:
      labels:
        app: shopmart-observability
    spec:
      containers:
        - name: dashboard
          image: shopmart-observability:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: observability-config
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shopmart-observability-service
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
  selector:
    app: shopmart-observability
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopmart-observability-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: shopmart.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shopmart-observability-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopmart-observability-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopmart-observability
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
